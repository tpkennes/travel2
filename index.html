<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f5f0e8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Planning Voyage"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Planning Voyage v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overscroll-behavior:none;transition:background 0.2s}
    #root{height:100%}
    ::-webkit-scrollbar{display:none}
    input,textarea,button,label{font-family:inherit}
    input,textarea,select{font-size:16px}

    /* Tap feedback — buttons only get :hover from the browser by default,
       which never fires on touch. Give every button a brief press-down
       scale/dim so taps feel acknowledged, like native iOS controls. */
    button{transition:transform 0.08s ease,opacity 0.08s ease}
    button:active{transform:scale(0.96);opacity:0.8}
    /* Same press feedback for non-<button> tappable elements (color swatches,
       the trip name header) that can't rely on the rule above. */
    .tap-scale{transition:transform 0.08s ease}
    .tap-scale:active{transform:scale(0.92)}

    /* Bottom sheets (EditModal, SettingsPanel, help modals) — slide up with
       an iOS-style decelerate curve instead of popping in instantly, and
       blur what's behind them like a native sheet presentation. */
    @keyframes sheet-backdrop-in{from{opacity:0}to{opacity:1}}
    @keyframes sheet-panel-in{from{transform:translateY(24px);opacity:0.4}to{transform:translateY(0);opacity:1}}
    .sheet-backdrop{backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:sheet-backdrop-in 0.2s ease-out}
    .sheet-panel{animation:sheet-panel-in 0.32s cubic-bezier(0.32,0.72,0,1)}

    input[type="date"]{max-width:100%;min-width:0;width:100%;-webkit-appearance:none;appearance:none;-webkit-min-logical-width:calc(100% - 16px)}
    :root{--app-max-width:100%}
    /* Large phones (iPhone Plus/Pro Max, ~420-599px) get a little breathing
       room on the sides instead of edge-to-edge content — applies uniformly
       to the app and to sheets since both size off this same variable. */
    @media(min-width:420px){:root{--app-max-width:calc(100% - 24px)}}
    @media(min-width:600px){:root{--app-max-width:680px}}
    @media(min-width:900px){:root{--app-max-width:780px}}
    @media(min-width:1200px){:root{--app-max-width:860px}}

    /* Table styles */
    .day-table{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed}
    .day-table thead th{position:sticky;top:0;z-index:5;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;border-bottom:2px solid var(--border2);background:var(--bg);white-space:nowrap;overflow:hidden}
    .day-row{cursor:pointer;transition:background 0.12s,opacity 0.2s}
    /* !important: the row's background is also set inline (rowBg, alternating
       stripe/swap colors) which otherwise always wins over a plain selector. */
    .day-row:hover{background:var(--hover) !important}
    .day-row:active{background:var(--hover) !important}
    .day-row td{padding:0;vertical-align:middle;overflow:hidden;transition:background 0.15s,opacity 0.2s}
    /* Hairline separator inset like an iOS table view — starts after the date
       column instead of full-bleed, and the date column itself stays bare. */
    .day-row td:not(:first-child){border-bottom:1px solid var(--border)}

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  const KEY  = "tripplanner_v3";
  const SKEY = "tripplanner_settings";
  const DEF  = { name:"Mon Voyage", startDate:"", endDate:"", days:[], cards:[] };
  const DEFS = { previewLines:2, fontSize:15, remoteUrl:"", theme:"light", gistId:"", gistToken:"", gistFilename:"voyage.json" };

  const uid   = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
  const load  = () => { try { const s=localStorage.getItem(KEY); if(!s) return DEF; const p=JSON.parse(s); if(!p||!Array.isArray(p.days)||!Array.isArray(p.cards)) return DEF; return {...DEF,...p}; } catch { return DEF; } };
  const loadS = () => { try { const s=localStorage.getItem(SKEY); if(!s) return DEFS; const p=JSON.parse(s); if(!p||typeof p!=="object"||Array.isArray(p)) return DEFS; return {...DEFS,...p}; } catch { return DEFS; } };

  const THEMES = {
    light: {
      bg:"#f5f0e8", surface:"#ffffff", surface2:"#faf7f2",
      border:"#e2d9cc", border2:"#cdc3b4",
      accent:"#c4622a", accent2:"#2a7fa8",
      text:"#2c2418", muted:"#6e6455", danger:"#b83030",
      onAccent:"#ffffff", hover:"#f0ebe0",
      tableHead:"#ede8df", rowAlt:"#faf7f2",
    },
    dark: {
      bg:"#0f0f0f", surface:"#1c1c1e", surface2:"#242426",
      border:"#2e2e30", border2:"#3c3c3e",
      accent:"#e88a56", accent2:"#5aa8d4",
      text:"#ededed", muted:"#8e8e93", danger:"#ff6b6b",
      onAccent:"#0f0f0f", hover:"#252527",
      tableHead:"#1a1a1c", rowAlt:"#1f1f21",
    },
  };

  const BADGE_COLORS_BY_THEME = {
    light: [
      { id:"red",    hex:"#a93226", label:"Rouge brique" },
      { id:"blue",   hex:"#1a5276", label:"Bleu marine"  },
      { id:"green",  hex:"#1e8449", label:"Vert forêt"   },
      { id:"purple", hex:"#6c3483", label:"Violet"       },
      { id:"amber",  hex:"#b7770d", label:"Ambre"        },
    ],
    dark: [
      { id:"red",    hex:"#e74c3c", label:"Rouge"   },
      { id:"blue",   hex:"#3498db", label:"Bleu"    },
      { id:"green",  hex:"#2ecc71", label:"Vert"    },
      { id:"purple", hex:"#9b59b6", label:"Violet"  },
      { id:"amber",  hex:"#f39c12", label:"Ambre"   },
    ],
  };

  const INLINE_COLORS_BY_THEME = {
    light: { r:"#c0392b", o:"#e07b2a", b:"#2a7fa8", v:"#27ae60", f:"#d4006a", m:"#6c3483", t:"#00897b", d:"#c49a00" },
    dark:  { r:"#ff6b6b", o:"#ffa94d", b:"#5aa8d4", v:"#51cf66", f:"#ff6b9d", m:"#b983e0", t:"#4fd1c5", d:"#fcc419" },
  };

  const FONT = "'DM Sans',sans-serif";
  const SERIF = "'Lora',serif";

  let currentTheme = (() => {
    try { const s = localStorage.getItem(SKEY); return s ? (JSON.parse(s).theme||"light") : "light"; }
    catch { return "light"; }
  })();

  const C             = { ...THEMES[currentTheme], font:FONT, serif:SERIF };
  const BADGE_COLORS  = [...BADGE_COLORS_BY_THEME[currentTheme]];
  const INLINE_COLORS = { ...INLINE_COLORS_BY_THEME[currentTheme] };

  const applyTheme = (name) => {
    currentTheme = name;
    Object.assign(C, THEMES[name], { font:FONT, serif:SERIF });
    BADGE_COLORS.length = 0;
    BADGE_COLORS_BY_THEME[name].forEach(c => BADGE_COLORS.push(c));
    Object.keys(INLINE_COLORS_BY_THEME[name]).forEach(k => INLINE_COLORS[k] = INLINE_COLORS_BY_THEME[name][k]);
    document.body.style.background = C.bg;
    document.documentElement.style.colorScheme = name;
    document.documentElement.style.setProperty("--range-accent", C.accent);
    document.documentElement.style.setProperty("--bg", C.bg);
    document.documentElement.style.setProperty("--border", C.border);
    document.documentElement.style.setProperty("--border2", C.border2);
    document.documentElement.style.setProperty("--hover", C.hover);
    let styleEl = document.getElementById("dyn-theme-style");
    if(!styleEl) { styleEl = document.createElement("style"); styleEl.id = "dyn-theme-style"; document.head.appendChild(styleEl); }
    styleEl.textContent = `input[type="range"]{accent-color:${C.accent}}`;
    const meta = document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute("content", C.bg);
  };

  const fmtLong  = iso => iso ? new Intl.DateTimeFormat("fr-FR",{weekday:"long",day:"numeric",month:"long"}).format(new Date(iso+"T12:00:00")) : "";
  const fmtShort = iso => iso ? new Intl.DateTimeFormat("fr-FR",{day:"numeric",month:"short"}).format(new Date(iso+"T12:00:00")) : "";
  const fmtNum   = iso => iso ? new Date(iso+"T12:00:00").getDate() : "—";
  const fmtMon   = iso => iso ? new Intl.DateTimeFormat("fr-FR",{month:"short"}).format(new Date(iso+"T12:00:00")) : "";
  const fmtDay   = iso => iso ? new Intl.DateTimeFormat("fr-FR",{weekday:"short"}).format(new Date(iso+"T12:00:00")) : "";
  const fmtInit  = iso => iso ? new Intl.DateTimeFormat("fr-FR",{weekday:"long"}).format(new Date(iso+"T12:00:00")).charAt(0).toUpperCase() : "";

  const buildDays = (s,e) => {
    const days=[]; const start=new Date(s+"T12:00:00"); const end=new Date(e+"T12:00:00");
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))
      days.push({id:uid(),date:d.toISOString().split("T")[0],planning:"",notes:""});
    return days;
  };

  /* ── Markdown parser ──
     Single source of truth for inline + block parsing, shared by the live
     React renderer (renderInline/renderBlock) and the static HTML export
     (renderInlineHtml/renderHtmlBlock in generateShareHtml) so the two never
     drift out of sync on supported syntax. */
  const parseInline = (text, colors=INLINE_COLORS) => {
    const rx = /(\*\*(.+?)\*\*)|(\*(.+?)\*)|(__(.*?)__)|\{([romvftbd]):(.+?)\}|(https?:\/\/[^\s]+)|(\b\d{1,2}[h:]\d{2}(?:am|pm)?\b|\b\d{1,2}(?:am|pm)\b)/gi;
    const parts=[]; let last=0; let m;
    while((m=rx.exec(text))!==null){
      if(m.index>last) parts.push({t:"text",v:text.slice(last,m.index)});
      if     (m[1])  parts.push({t:"bold",      v:m[2]});
      else if(m[3])  parts.push({t:"italic",    v:m[4]});
      else if(m[5])  parts.push({t:"underline", v:m[6]});
      else if(m[7])  parts.push({t:"color",     v:m[8], color:colors[m[7]]});
      else if(m[9])  parts.push({t:"url",       v:m[9]});
      else if(m[10]) parts.push({t:"time",      v:m[10]});
      last=m.index+m[0].length;
    }
    if(last<text.length) parts.push({t:"text",v:text.slice(last)});
    return parts;
  };

  const classifyLine = line => {
    if(line.trim()==="---") return {type:"hr"};
    const isH = line.startsWith("# ");
    const isS = line.startsWith("> ");
    return {type:isH?"h":isS?"s":"p", content:isH?line.slice(2):isS?line.slice(2):line};
  };

  const renderInline = (text, baseColor) => parseInline(text).map((p,i) => {
    if(p.t==="bold")      return <strong key={i} style={{fontWeight:600,color:baseColor}}>{p.v}</strong>;
    if(p.t==="italic")    return <em key={i} style={{fontStyle:"italic"}}>{p.v}</em>;
    if(p.t==="underline") return <span key={i} style={{textDecoration:"underline"}}>{p.v}</span>;
    if(p.t==="color")     return <span key={i} style={{color:p.color}}>{renderInline(p.v,p.color)}</span>;
    if(p.t==="time")      return <strong key={i} style={{fontWeight:600,color:baseColor}}>{p.v}</strong>;
    if(p.t==="url")       return <a key={i} href={p.v} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{color:C.accent2,textDecoration:"underline",fontSize:"0.88em",wordBreak:"break-all",overflowWrap:"anywhere"}}>{p.v}</a>;
    return <span key={i}>{p.v}</span>;
  });

  const renderBlock = (text, fontSize, withBullets=false) => {
    if(!text) return null;
    return text.split("\n").filter(Boolean).map((line,i) => {
      const {type,content} = classifyLine(line);
      if(type==="hr") return <div key={i} style={{height:1,background:C.border2,margin:"6px 0"}}/>;
      const isH = type==="h", isS = type==="s";
      const fs = isH?fontSize+2:isS?fontSize-1:fontSize;
      const color = isH?C.accent:C.text;
      const mb = isH?5:3;
      if(isS) return (
        <div key={i} style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:mb,paddingLeft:12,borderLeft:`2px solid ${C.border2}`,minWidth:0}}>
          <span style={{color:C.muted,fontSize:fs,flexShrink:0}}>➔</span>
          <div style={{fontSize:fs,color:C.muted,lineHeight:1.65,minWidth:0,flex:1,overflowWrap:"anywhere",wordBreak:"break-word"}}>{renderInline(content,C.muted)}</div>
        </div>
      );
      if(withBullets&&!isH) return (
        <div key={i} style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:mb,minWidth:0}}>
          <div style={{width:4,height:4,borderRadius:"50%",background:C.accent2,flexShrink:0,marginTop:6}}/>
          <div style={{fontSize:fs,color,fontWeight:isH?600:400,fontFamily:isH?C.serif:C.font,lineHeight:1.65,minWidth:0,flex:1,overflowWrap:"anywhere",wordBreak:"break-word"}}>{renderInline(content,color)}</div>
        </div>
      );
      return <div key={i} style={{fontSize:fs,color,fontWeight:isH?600:400,fontFamily:isH?C.serif:C.font,lineHeight:1.7,marginBottom:mb,overflowWrap:"anywhere",wordBreak:"break-word"}}>{renderInline(content,color)}</div>;
    });
  };

  const escHtml = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  /* HTML-string counterpart of renderInline, for the static share export.
     Always resolves {r:}..{d:} tags against the light palette regardless of
     the current in-app theme, since the exported file is styled with fixed
     light colors and is read outside the app. */
  const renderInlineHtml = (text, baseColor, colors=INLINE_COLORS_BY_THEME.light) => parseInline(text, colors).map(p => {
    if(p.t==="bold")      return `<strong style="font-weight:600;color:${baseColor}">${escHtml(p.v)}</strong>`;
    if(p.t==="italic")    return `<em>${escHtml(p.v)}</em>`;
    if(p.t==="underline") return `<u>${escHtml(p.v)}</u>`;
    if(p.t==="color")     return `<span style="color:${p.color}">${renderInlineHtml(p.v,p.color,colors)}</span>`;
    if(p.t==="time")      return `<strong style="font-weight:600;color:${baseColor}">${escHtml(p.v)}</strong>`;
    if(p.t==="url")       return `<a href="${escHtml(p.v)}" target="_blank" style="color:#2a7fa8;text-decoration:underline;word-break:break-all">${escHtml(p.v)}</a>`;
    return escHtml(p.v);
  }).join("");

  const stripMd = t => (t||"").replace(/^# /,"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/__(.*?)__/g,"$1").replace(/\{[romvftbd]:(.+?)\}/g,"$1").replace(/^> /,"");

  /* ════════ COLOR PICKER ════════ */
  function ColorPicker({value, onChange}) {
    return (
      <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4}}>
        <div className="tap-scale" onClick={()=>onChange(null)} style={{width:28,height:28,borderRadius:"50%",background:C.surface2,border:`2px solid ${!value?C.accent:C.border2}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.muted}}>✕</div>
        {BADGE_COLORS.map(c=>(
          <div key={c.id} className="tap-scale" onClick={()=>onChange(c.id)} title={c.label} style={{width:28,height:28,borderRadius:"50%",background:c.hex,cursor:"pointer",outline:value===c.id?`3px solid ${c.hex}`:"none",outlineOffset:2,border:`2px solid ${value===c.id?"#fff":"transparent"}`}}/>
        ))}
      </div>
    );
  }

  /* ════════ MARKDOWN HELP ════════ */
  function MarkdownHelp() {
    return (
      <div style={{padding:"10px 14px",borderRadius:10,background:`${C.accent}0c`,border:`1px solid ${C.accent}25`}}>
        <div style={{fontSize:11,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Aide markdown</div>
        <div style={{fontSize:12,color:C.muted,lineHeight:1.9}}>
          <strong style={{color:C.text}}># Titre</strong> · <strong style={{color:C.text}}>**gras**</strong> · <strong style={{color:C.text}}>*italique*</strong> · <strong style={{color:C.text}}>__souligné__</strong><br/>
          <strong style={{color:C.text}}>&gt; texte</strong> → sous-étape · <strong style={{color:C.text}}>---</strong> → séparateur<br/>
          <strong style={{color:C.text}}>https://...</strong> → lien cliquable<br/>
          <span style={{color:INLINE_COLORS.r}}>{"{r:}"}</span> rouge · <span style={{color:INLINE_COLORS.o}}>{"{o:}"}</span> orange · <span style={{color:INLINE_COLORS.b}}>{"{b:}"}</span> bleu · <span style={{color:INLINE_COLORS.v}}>{"{v:}"}</span> vert<br/>
          <span style={{color:INLINE_COLORS.f}}>{"{f:}"}</span> fuchsia · <span style={{color:INLINE_COLORS.m}}>{"{m:}"}</span> violet · <span style={{color:INLINE_COLORS.t}}>{"{t:}"}</span> turquoise · <span style={{color:INLINE_COLORS.d}}>{"{d:}"}</span> doré
        </div>
      </div>
    );
  }

  /* ════════ FORMAT TOOLBAR ════════ */
  function FormatToolbar({focusedRef, helpOpen, onToggleHelp, active=true}) {
    const [colorOpen,setColorOpen] = useState(false);
    const btnBase = {minWidth:44,height:44,borderRadius:9,background:C.surface2,border:`1px solid ${C.border2}`,cursor:"pointer",fontSize:14,color:C.text,display:"flex",alignItems:"center",justifyContent:"center"};

    // Wrap: selection (or a selected placeholder if nothing is selected) so the
    // user can immediately type over it — previously an empty selection left
    // the cursor stranded after the closing tag instead of between the tags.
    // Also guards against a stale ref pointing at a textarea that's been
    // unmounted (field switched to Aperçu) — silently no-ops instead of
    // writing into a detached node.
    const wrapSelection = (before,after,placeholder="texte") => {
      const el=focusedRef.current; if(!el || !document.body.contains(el)) return;
      const s=el.selectionStart, e=el.selectionEnd, v=el.value;
      const mid = e>s ? v.slice(s,e) : placeholder;
      const nv = v.slice(0,s)+before+mid+after+v.slice(e);
      Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,"value").set.call(el,nv);
      el.dispatchEvent(new Event("input",{bubbles:true}));
      el.focus();
      el.setSelectionRange(s+before.length, s+before.length+mid.length);
    };
    const insertAtCursor = str => {
      const el=focusedRef.current; if(!el || !document.body.contains(el)) return;
      const s=el.selectionStart, e=el.selectionEnd, v=el.value;
      const nv = v.slice(0,s)+str+v.slice(e);
      Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,"value").set.call(el,nv);
      el.dispatchEvent(new Event("input",{bubbles:true}));
      el.focus();
      const c=s+str.length;
      el.setSelectionRange(c,c);
    };

    const btns=[
      {l:"G",  title:"Gras",       s:{fontWeight:700},             a:()=>wrapSelection("**","**")},
      {l:"I",  title:"Italique",   s:{fontStyle:"italic"},         a:()=>wrapSelection("*","*")},
      {l:"S",  title:"Souligné",   s:{textDecoration:"underline"}, a:()=>wrapSelection("__","__")},
      {l:"➔",  title:"Flèche",     s:{fontSize:15},                a:()=>insertAtCursor("➔")},
      {l:"↳",  title:"Sous-étape", s:{fontSize:15},                a:()=>insertAtCursor("> ")},
      {l:"—",  title:"Séparateur", s:{fontSize:15},                a:()=>insertAtCursor("\n---\n")},
    ];
    const colorBtns=[
      {k:"r",label:"Rouge"},{k:"o",label:"Orange"},{k:"b",label:"Bleu"},{k:"v",label:"Vert"},
      {k:"f",label:"Fuchsia"},{k:"m",label:"Violet"},{k:"t",label:"Turquoise"},{k:"d",label:"Doré"},
    ];
    return (
      <div style={{marginBottom:8}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,opacity:active?1:0.4,pointerEvents:active?"auto":"none",transition:"opacity 0.15s"}} title={active?undefined:"Passe ce champ en mode Écrire pour formater"}>
            {btns.map((b,i)=>(
              <button key={i} title={b.title}
                onMouseDown={e=>{e.preventDefault();b.a();}}
                onTouchStart={e=>{e.preventDefault();b.a();}}
                style={{...btnBase,...b.s}}>
                {b.l}
              </button>
            ))}
            <button title="Couleur du texte"
              onMouseDown={e=>{e.preventDefault();setColorOpen(o=>!o);}}
              onTouchStart={e=>{e.preventDefault();setColorOpen(o=>!o);}}
              style={{...btnBase,fontSize:15,background:colorOpen?`${C.accent}20`:C.surface2,border:`1px solid ${colorOpen?C.accent:C.border2}`}}>
              🎨
            </button>
          </div>
          {onToggleHelp && (
            <button title="Aide syntaxe"
              onMouseDown={e=>{e.preventDefault();onToggleHelp();}}
              onTouchStart={e=>{e.preventDefault();onToggleHelp();}}
              style={{...btnBase,fontWeight:700,color:C.muted,background:helpOpen?`${C.accent}20`:C.surface2,border:`1px solid ${helpOpen?C.accent:C.border2}`}}>
              ?
            </button>
          )}
        </div>
        {colorOpen && active && (
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
            {colorBtns.map(c=>(
              <button key={c.k} title={c.label}
                onMouseDown={e=>{e.preventDefault();wrapSelection(`{${c.k}:`,"}");setColorOpen(false);}}
                onTouchStart={e=>{e.preventDefault();wrapSelection(`{${c.k}:`,"}");setColorOpen(false);}}
                style={{...btnBase,color:INLINE_COLORS[c.k],fontSize:16}}>
                ●
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  /* ════════ MARKDOWN FIELD (write / live preview) ════════ */
  function MdField({label, value, onChange, placeholder, minHeight, taRef, onFocus, withBullets=false, onEnterPreview}) {
    const [preview,setPreview] = useState(false);
    const lbl = {fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.8};
    const ta  = {width:"100%",padding:"11px 13px",borderRadius:10,background:C.surface2,border:`1px solid ${C.border2}`,color:C.text,fontSize:16,outline:"none",resize:"vertical",minHeight,lineHeight:1.65};
    const tab = active => ({padding:"4px 10px",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer",border:`1px solid ${active?C.accent:C.border2}`,background:active?`${C.accent}15`:"transparent",color:active?C.accent:C.muted});
    return (
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <label style={lbl}>{label}</label>
          <div style={{display:"flex",gap:4}}>
            <button type="button" onClick={()=>setPreview(false)} style={tab(!preview)}>✏️ Écrire</button>
            <button type="button" onClick={()=>{onEnterPreview&&onEnterPreview();setPreview(true);}} style={tab(preview)}>👁 Aperçu</button>
          </div>
        </div>
        {preview ? (
          <div style={{...ta,overflowY:"auto"}}>
            {value ? renderBlock(value,14,withBullets) : <span style={{color:C.muted,fontSize:13,fontStyle:"italic"}}>Rien à prévisualiser…</span>}
          </div>
        ) : (
          <textarea ref={taRef} onFocus={onFocus} style={ta} placeholder={placeholder} value={value||""} onChange={e=>onChange(e.target.value)}/>
        )}
      </div>
    );
  }

  /* ════════ APP ════════ */
  function App() {
    const [data,setData]         = useState(load);
    const [settings,setSettings] = useState(loadS);
    const [, forceRerender]      = useState(0);
    const [tab,setTab]           = useState("days");
    const [syncing,setSyncing]   = useState(false);
    const [detailDayId,setDetailDayId]   = useState(null);
    const [detailCardId,setDetailCardId] = useState(null);
    const [searchQuery,setSearchQuery]     = useState("");
    const [showSearch,setShowSearch]       = useState(false);
    const [confirm,setConfirm]             = useState(null); // {message, onConfirm}
    const [modal,setModal]       = useState(null);
    const [form,setForm]         = useState({});
    const [swapFor,setSwapFor]   = useState(null);
    const [toast,setToast]       = useState(null);
    const [showSettings,setShowSettings] = useState(false);
    const [showArchivedDays,setShowArchivedDays] = useState(false);
    const [showArchivedCards,setShowArchivedCards] = useState(false);

    const save = nd => {
      setData(nd); setSyncing(true);
      try{localStorage.setItem(KEY,JSON.stringify(nd));}catch{}
      setTimeout(()=>setSyncing(false),800);
    };
    const saveSettings = ns => {
      if(ns.theme !== settings.theme) { applyTheme(ns.theme); forceRerender(n=>n+1); }
      setSettings(ns);
      try{localStorage.setItem(SKEY,JSON.stringify(ns));}catch{}
    };
    const showToast = m => { setToast(m); setTimeout(()=>setToast(null),3000); };

    const exportData = () => {
      const url=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
      const a=document.createElement("a"); a.href=url;
      a.download=(data.name.replace(/[^a-z0-9]/gi,"-").toLowerCase()||"voyage")+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    };
    const copyJson = async () => {
      const text = JSON.stringify(data,null,2);
      try {
        if(navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); showToast("📋 JSON copié !"); }
        else {
          const ta = document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
          document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); showToast("📋 JSON copié !");
        }
      } catch { showToast("❌ Copie impossible"); }
    };

    const publishToGist = async () => {
      const id = settings.gistId?.trim(); const token = settings.gistToken?.trim(); const filename = (settings.gistFilename?.trim() || "voyage.json");
      if(!id || !token) { showToast("⚠️ Configure ton Gist ID et Token"); return; }
      showToast("⏳ Publication...");
      try {
        const body = { files: { [filename]: { content: JSON.stringify(data,null,2) } } };
        const res = await fetch(`https://api.github.com/gists/${encodeURIComponent(id)}`, {
          method:"PATCH", headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json"}, body:JSON.stringify(body),
        });
        if(res.status===401){showToast("❌ Token invalide");return;}
        if(res.status===404){showToast("❌ Gist introuvable");return;}
        if(!res.ok){showToast(`❌ Erreur ${res.status}`);return;}
        showToast("✅ Gist publié !");
      } catch { showToast("❌ Connexion impossible"); }
    };

    const showConfirm = (message, onConfirm) => setConfirm({message, onConfirm});

    const importData = e => {
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=ev=>{
        try {
          const p=JSON.parse(ev.target.result);
          if(!Array.isArray(p.days)||!Array.isArray(p.cards)) throw 0;
          const hasContent = data.days.some(d=>d.planning||d.notes) || data.cards.length>0;
          const doImport = () => { save(p); showToast("Planning importé ✅"); };
          if(hasContent) {
            showConfirm(`Importer "${p.name||"ce planning"}" écrasera toutes tes données actuelles. Cette action est irréversible.`, doImport);
          } else { doImport(); }
        } catch { showToast("Fichier invalide ❌"); }
      };
      r.readAsText(f); e.target.value="";
    };

    const toRawUrl = url => {
      if(!url) return url; let m;
      m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/); if(m) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
      m = url.match(/drive\.google\.com\/open\?id=([^&]+)/); if(m) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
      m = url.match(/^(https:\/\/gist\.githubusercontent\.com\/[^/]+\/[a-f0-9]+)\/raw\/[a-f0-9]+\/(.+)$/); if(m) return `${m[1]}/raw/${m[2]}`;
      m = url.match(/^https:\/\/gist\.github\.com\/([^/]+)\/([a-f0-9]+)\/?$/); if(m) return `https://gist.githubusercontent.com/${m[1]}/${m[2]}/raw`;
      if(url.includes("dropbox.com")) return url.replace(/([?&])dl=0/,"$1dl=1");
      return url;
    };

    const loadFromUrl = async (url) => {
      if(!url || !url.trim()){showToast("⚠️ Aucune URL configurée");return;}
      const finalUrl = toRawUrl(url.trim()); showToast("⏳ Téléchargement...");
      try {
        const res = await fetch(finalUrl, { cache:"no-store" }); if(!res.ok) throw new Error("HTTP "+res.status);
        const text = await res.text(); const p = JSON.parse(text);
        if(!Array.isArray(p.days) || !Array.isArray(p.cards)) throw new Error("format");
        save(p); showToast("✅ Planning à jour !");
      } catch(err) { if(err.message==="format") showToast("❌ Format du fichier invalide"); else showToast("❌ Lien inaccessible (CORS ou URL)"); }
    };

    const openModal = (type,item=null) => {
      setModal({type,item});
      if(type==="day")  setForm(item?{...item}:{date:"",planning:"",notes:"",color:null});
      if(type==="card") setForm(item?{kind:"info",todos:[],...item}:{kind:"info",title:"",content:"",color:null,todos:[]});
      if(type==="trip") setForm({name:data.name,startDate:data.startDate||"",endDate:data.endDate||""});
    };
    const closeModal = () => { setModal(null); setForm({}); };

    const saveDay  = () => { const days  = modal.item?data.days.map(d=>d.id===modal.item.id?{...d,...form}:d):[...data.days,{id:uid(),...form}];  save({...data,days});  closeModal(); };
    const saveCard = () => { const cards = modal.item?data.cards.map(c=>c.id===modal.item.id?{...c,...form}:c):[...data.cards,{id:uid(),...form}]; save({...data,cards}); closeModal(); };
    const saveTrip = () => { save({...data,name:form.name,startDate:form.startDate,endDate:form.endDate}); closeModal(); };

    const generateDays = () => {
      if(!form.startDate||!form.endDate){showToast("⚠️ Indique les deux dates.");return;}
      if(form.startDate>form.endDate){showToast("⚠️ La date de retour doit être après le départ.");return;}
      const fresh=buildDays(form.startDate,form.endDate);
      const merged=fresh.map(nd=>data.days.find(d=>d.date===nd.date)||nd);
      const preserved=merged.filter(d=>data.days.find(dd=>dd.date===d.date&&(dd.planning||dd.notes)));
      const doGenerate = () => {
        save({...data,name:form.name,startDate:form.startDate,endDate:form.endDate,days:merged});
        closeModal();
        showToast(`✨ ${merged.length} jours générés${preserved.length>0?` · ${preserved.length} conservé${preserved.length>1?"s":""}`:""} !`);
      };
      const removed=data.days.filter(d=>d.planning||d.notes).filter(d=>!fresh.find(nd=>nd.date===d.date));
      if(removed.length>0) {
        showConfirm(`${removed.length} jour${removed.length>1?"s":""}  avec du contenu ${removed.length>1?"sont":"est"} hors de la nouvelle plage de dates et sera supprimé${removed.length>1?"s":""}. Continuer ?`, doGenerate);
      } else {
        doGenerate();
      }
    };

    const deleteDay  = id => { save({...data,days: data.days.filter(d=>d.id!==id)});  closeModal(); setDetailDayId(cur=>cur===id?null:cur); };
    const deleteCard = id => { save({...data,cards:data.cards.filter(c=>c.id!==id)}); closeModal(); setDetailCardId(cur=>cur===id?null:cur); };
    const moveDay    = (id,dir) => { const a=[...data.days];  const i=a.findIndex(d=>d.id===id); const ni=i+dir; if(ni<0||ni>=a.length)return; [a[i],a[ni]]=[a[ni],a[i]]; save({...data,days:a}); };
    const moveCard   = (id,dir) => { const a=[...data.cards]; const i=a.findIndex(c=>c.id===id); const ni=i+dir; if(ni<0||ni>=a.length)return; [a[i],a[ni]]=[a[ni],a[i]]; save({...data,cards:a}); };

    const toggleTodo = (cardId, todoId) => {
      const cards = data.cards.map(c => { if(c.id!==cardId) return c; return {...c, todos:(c.todos||[]).map(t=>t.id===todoId?{...t,done:!t.done}:t)}; });
      save({...data,cards});
    };

    const toggleArchiveDay  = id => save({...data,days: data.days.map(d=>d.id===id?{...d,archived:!d.archived}:d)});
    const toggleArchiveCard = id => save({...data,cards:data.cards.map(c=>c.id===id?{...c,archived:!c.archived}:c)});

    const startSwap = id => { setSwapFor(id); setDetailDayId(null); };
    const doSwap = targetId => {
      const src=data.days.find(d=>d.id===swapFor); const tgt=data.days.find(d=>d.id===targetId);
      if(!src || !tgt){ setSwapFor(null); return; }
      const days=data.days.map(d=>{
        if(d.id===swapFor)  return{...d,planning:tgt.planning,notes:tgt.notes};
        if(d.id===targetId) return{...d,planning:src.planning,notes:src.notes};
        return d;
      });
      save({...data,days}); setSwapFor(null); showToast("↔ Contenu échangé !");
    };

    const tripLabel = data.startDate&&data.endDate?`${fmtShort(data.startDate)} – ${fmtShort(data.endDate)}`:null;

    // Compteur de jours
    const dayCounter = (() => {
      if(!data.startDate || !data.endDate) return null;
      const today = new Date(); today.setHours(0,0,0,0);
      const start = new Date(data.startDate+"T12:00:00");
      const end   = new Date(data.endDate+"T12:00:00");
      start.setHours(0,0,0,0); end.setHours(0,0,0,0);
      const diffStart = Math.round((start - today) / 86400000);
      const diffEnd   = Math.round((end   - today) / 86400000);
      if(diffStart > 0)  return { label:`Dans ${diffStart} jour${diffStart>1?"s":""}`, color:C.accent2 };
      if(diffEnd   < 0)  return { label:`Terminé il y a ${Math.abs(diffEnd)} j`, color:C.muted };
      const dayNum = Math.round((today - start) / 86400000) + 1;
      const total  = Math.round((end - start) / 86400000) + 1;
      return { label:`Jour ${dayNum} / ${total}`, color:C.accent };
    })();

    // Génération HTML statique pour partage
    const generateShareHtml = () => {
      const activeDays  = data.days.filter(d=>!d.archived);
      const activeCards = data.cards.filter(c=>!c.archived);

      // Reuses the same classifyLine/renderInlineHtml as the live app (see
      // markdown parser section) so this export can't silently drift from
      // what's shown on-screen (colors, bullets, bold hours, sub-steps).
      const renderHtmlBlock = (text, withBullets=false) => {
        if(!text) return "";
        return text.split("\n").filter(Boolean).map(line => {
          const {type,content} = classifyLine(line);
          if(type==="hr") return `<hr style="border:none;border-top:1px solid #cdc3b4;margin:8px 0">`;
          if(type==="h")   return `<div style="font-family:'Lora',serif;font-weight:600;font-size:15px;color:#c4622a;margin:10px 0 4px">${renderInlineHtml(content,"#c4622a")}</div>`;
          if(type==="s")   return `<div style="display:flex;gap:6px;align-items:baseline;padding-left:12px;border-left:2px solid #cdc3b4;color:#8a7e6e;font-size:13px;margin-bottom:3px"><span>➔</span><span>${renderInlineHtml(content,"#8a7e6e")}</span></div>`;
          if(withBullets)  return `<div style="display:flex;gap:8px;align-items:baseline;margin-bottom:3px"><span style="width:4px;height:4px;border-radius:50%;background:#2a7fa8;flex-shrink:0"></span><span style="font-size:13px;line-height:1.7;color:#2c2418">${renderInlineHtml(content,"#2c2418")}</span></div>`;
          return `<div style="font-size:13px;margin-bottom:3px;line-height:1.7;color:#2c2418">${renderInlineHtml(content,"#2c2418")}</div>`;
        }).join("");
      };

      const daysHtml = activeDays.map(day => {
        const badgeHex = day.color?BADGE_COLORS.find(c=>c.id===day.color)?.hex:"#c4622a";
        const hasPlan  = !!(day.planning||"").trim();
        const hasNotes = !!(day.notes||"").trim();
        if(!hasPlan && !hasNotes) return "";
        return `
        <div style="border-left:4px solid ${badgeHex};background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.07)">
          <div style="font-family:'Lora',serif;font-size:16px;font-weight:600;color:${badgeHex};margin-bottom:10px;text-transform:capitalize">${escHtml(fmtLong(day.date))}</div>
          ${hasPlan?`<div style="margin-bottom:${hasNotes?12:0}px">${renderHtmlBlock(day.planning,false)}</div>`:""}
          ${hasNotes?`<div style="background:#f0f7fc;border-radius:6px;padding:10px 12px;border:1px solid #b8d9ed"><div style="font-size:10px;font-weight:700;color:#2a7fa8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">📌 Infos pratiques</div>${renderHtmlBlock(day.notes,true)}</div>`:""}
        </div>`;
      }).join("");

      const cardsHtml = activeCards.map(card => {
        const badgeHex = card.color?BADGE_COLORS.find(c=>c.id===card.color)?.hex:"#2a7fa8";
        const isTodo = card.kind==="todo";
        const content = isTodo
          ? (card.todos||[]).map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #e2d9cc"><div style="width:16px;height:16px;border-radius:3px;border:2px solid ${t.done?"#2a7fa8":"#cdc3b4"};background:${t.done?"#2a7fa8":"transparent"};flex-shrink:0;display:flex;align-items:center;justify-content:center">${t.done?`<span style="color:#fff;font-size:9px;font-weight:700">✓</span>`:""}</div><span style="font-size:13px;color:${t.done?"#8a7e6e":"#2c2418"};text-decoration:${t.done?"line-through":"none"}">${escHtml(t.text)}</span></div>`).join("")
          : renderHtmlBlock(card.content,true);
        return `
        <div style="border-left:4px solid ${badgeHex};background:#fff;border-radius:8px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.07)">
          <div style="font-weight:600;font-size:13px;color:#2c2418;margin-bottom:8px">${isTodo?"☑":"📋"} ${escHtml(card.title||"Sans titre")}</div>
          ${content}
        </div>`;
      }).join("");

      const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${escHtml(data.name)}</title><link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#f5f0e8;color:#2c2418;padding:20px;max-width:680px;margin:0 auto}h1{font-family:'Lora',serif;font-size:22px;font-weight:600;margin-bottom:4px}h2{font-family:'Lora',serif;font-size:16px;font-weight:600;color:#c4622a;margin:24px 0 10px;border-bottom:2px solid #e2d9cc;padding-bottom:6px}.meta{font-size:12px;color:#8a7e6e;margin-bottom:20px}.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:500px){.cards-grid{grid-template-columns:1fr}}.footer{text-align:center;font-size:11px;color:#8a7e6e;margin-top:32px;padding-top:12px;border-top:1px solid #e2d9cc}</style></head><body>
      <h1>${escHtml(data.name)}</h1>
      <div class="meta">${tripLabel?escHtml(tripLabel)+" · ":""} ${activeDays.length} jours · Généré le ${new Date().toLocaleDateString("fr-FR")}</div>
      ${daysHtml?`<h2>📅 Programme</h2>${daysHtml}`:""}
      ${cardsHtml?`<h2>📋 Infos voyage</h2><div class="cards-grid">${cardsHtml}</div>`:""}
      <div class="footer">Planning Voyage v2.2</div>
      </body></html>`;

      const blob = new Blob([html], {type:"text/html"});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = (data.name.replace(/[^a-z0-9]/gi,"-").toLowerCase()||"voyage")+"-partage.html";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1500);
      showToast("📄 Page de partage générée !");
    };

    const safeTop = "max(20px, env(safe-area-inset-top))";
    const safeBot = "max(24px, env(safe-area-inset-bottom))";

    return (
      <div style={{fontFamily:C.font,background:C.bg,minHeight:"100svh",color:C.text,maxWidth:"var(--app-max-width)",margin:"0 auto",display:"flex",flexDirection:"column"}}>

        {/* ── HEADER ── */}
        <div style={{paddingTop:safeTop,background:C.bg,position:"sticky",top:0,zIndex:10,borderBottom:`1px solid ${C.border}`}}>
          {/* Top bar */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 0"}}>
            <div className="tap-scale" onClick={()=>openModal("trip")} style={{cursor:"pointer",flex:1,minWidth:0}}>
              <div style={{fontFamily:C.serif,fontSize:18,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.2}}>{data.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:1,flexWrap:"wrap"}}>
                {tripLabel&&<div style={{fontSize:11,color:C.accent,fontWeight:500}}>{tripLabel} · {data.days.filter(d=>!d.archived).length} jours</div>}
                {dayCounter&&<div style={{fontSize:11,fontWeight:700,color:dayCounter.color,background:`${dayCounter.color}15`,padding:"1px 7px",borderRadius:10,border:`1px solid ${dayCounter.color}30`}}>{dayCounter.label}</div>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <button onClick={()=>{setShowSearch(!showSearch);setSearchQuery("");}} style={{padding:"5px 9px",borderRadius:8,background:showSearch?`${C.accent}15`:C.surface,border:`1px solid ${showSearch?C.accent:C.border2}`,color:showSearch?C.accent:C.muted,fontSize:13,cursor:"pointer"}} title="Rechercher">🔍</button>
              <button onClick={generateShareHtml} style={{padding:"5px 9px",borderRadius:8,background:C.surface,border:`1px solid ${C.border2}`,color:C.muted,fontSize:13,cursor:"pointer"}} title="Exporter en page partageable">📤</button>
              <button onClick={()=>saveSettings({...settings,theme:currentTheme==="light"?"dark":"light"})} style={{padding:"5px 9px",borderRadius:8,background:C.surface,border:`1px solid ${C.border2}`,color:C.muted,fontSize:13,cursor:"pointer"}} title="Changer de thème">{currentTheme==="light"?"🌙":"☀️"}</button>
              <div style={{fontSize:10,color:syncing?C.accent:C.muted,minWidth:16,textAlign:"center"}}>{syncing?"⟳":"✓"}</div>
              <button onClick={()=>setShowSettings(true)} style={{padding:"5px 9px",borderRadius:8,background:C.surface,border:`1px solid ${C.border2}`,color:C.muted,fontSize:14,cursor:"pointer"}}>⚙️</button>
              <button onClick={()=>openModal(tab==="days"?"day":"card")} style={{padding:"5px 11px",borderRadius:8,background:C.accent,border:"none",color:C.onAccent,fontSize:16,fontWeight:700,cursor:"pointer",lineHeight:1}} title="Ajouter">+</button>
            </div>
          </div>

          {/* Search bar */}
          {showSearch&&(
            <div style={{padding:"8px 16px 0"}}>
              <input
                autoFocus
                type="text"
                placeholder={tab==="days"?"Rechercher dans le programme...":"Rechercher dans les infos..."}
                value={searchQuery}
                onChange={e=>setSearchQuery(e.target.value)}
                style={{width:"100%",padding:"9px 12px",borderRadius:9,background:C.surface,border:`1.5px solid ${C.accent}`,color:C.text,fontSize:15,outline:"none"}}
              />
            </div>
          )}

          {/* Tabs — iOS-style segmented control (sliding pill) instead of
              underline tabs, which is the Material/Android convention */}
          <div style={{position:"relative",display:"flex",margin:"8px 16px 12px",padding:3,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10}}>
            <div style={{position:"absolute",top:3,bottom:3,left:3,width:"calc(50% - 3px)",borderRadius:8,background:C.surface,boxShadow:"0 1px 3px rgba(0,0,0,0.15)",transform:tab==="days"?"translateX(0%)":"translateX(100%)",transition:"transform 0.28s cubic-bezier(0.32,0.72,0,1)"}}/>

            const activeDays   = data.days.filter(d=>!d.archived).filter(d=>!q||fmtLong(d.date).toLowerCase().includes(q)||(d.planning||"").toLowerCase().includes(q)||(d.notes||"").toLowerCase().includes(q));

  /* ════════ DAY ROW (table row) ════════ */
  function DayRow({day,swapMode,isSwapSource,rowIndex,settings,onToggle}) {
    const isArchived = !!day.archived;
    const hasPlan   = !!(day.planning||"").trim();
    const hasNotes  = !!(day.notes||"").trim();
    const swapTarget= swapMode&&!isSwapSource;

    const badgeHex  = day.color?BADGE_COLORS.find(c=>c.id===day.color)?.hex:null;
    const allLines  = (day.planning||"").split("\n").filter(Boolean);
    const previewContent = allLines.slice(0, settings.previewLines).join("\n");

    // Row coloring
    const rowBg = isSwapSource
      ? `${C.accent}18`
      : swapTarget
        ? `${C.accent2}0c`
        : rowIndex%2===0 ? C.surface : C.rowAlt;

    const borderLeft = badgeHex
      ? `4px solid ${badgeHex}`
      : isSwapSource
        ? `4px solid ${C.accent}`
        : `4px solid transparent`;

    const dayShort = fmtDay(day.date); // "lun.", "mar."...
    const dayNum   = fmtNum(day.date);
    const dayMon   = fmtMon(day.date);

    return (
      <tr className="day-row"
        onClick={onToggle}
        style={{background:rowBg,cursor:"pointer",transition:"background 0.1s,opacity 0.2s",opacity:isArchived?0.55:1}}>

        {/* Date cell */}
        <td style={{width:52,borderLeft,padding:"10px 0",textAlign:"center",verticalAlign:"middle",userSelect:"none"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
            <div style={{fontSize:9,fontWeight:700,color:badgeHex||C.muted,letterSpacing:0.5,textTransform:"uppercase",lineHeight:1}}>{dayShort}</div>
            <div style={{fontFamily:C.serif,fontWeight:600,fontSize:22,lineHeight:1.1,color:badgeHex||C.accent}}>{dayNum}</div>
            <div style={{fontSize:9,color:badgeHex||C.muted,lineHeight:1}}>{dayMon}</div>
          </div>
        </td>

        {/* Content preview cell */}
        <td style={{padding:"10px 10px 10px 8px",minWidth:0,verticalAlign:"middle"}}>
          {isArchived?(
            <span style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>📦 Archivé — {fmtShort(day.date)}</span>
          ):swapTarget?(
            <span style={{fontSize:12,color:C.accent2,fontStyle:"italic"}}>Toucher pour échanger le contenu</span>
          ):isSwapSource?(
            <span style={{fontSize:12,color:C.accent,fontWeight:600}}>↔ Jour sélectionné pour l'échange</span>
          ):hasPlan?(
            <div style={{overflow:"hidden"}}>{renderBlock(previewContent, settings.fontSize, false)}</div>
          ):(
            <span style={{fontSize:settings.fontSize-1,color:C.muted,fontStyle:"italic"}}>Journée vide — toucher pour remplir</span>
          )}
        </td>

        {/* Indicators + chevron */}
        <td style={{width:36,padding:"10px 6px",textAlign:"center",verticalAlign:"middle"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{display:"flex",gap:4,justifyContent:"center"}}>
              {hasPlan &&!isArchived&&<div style={{width:6,height:6,borderRadius:"50%",background:C.accent}}/>}
              {hasNotes&&!isArchived&&<div style={{width:6,height:6,borderRadius:"50%",background:C.accent2}}/>}
            </div>
            <div style={{color:C.muted,fontSize:14,lineHeight:1}}>›</div>
          </div>
        </td>
      </tr>
    );
  }

  /* ════════ INFO CARD (table row, same style as DayRow) ════════ */
  function InfoCard({card,rowIndex,onToggle}) {
    const isArchived = !!card.archived;
    const isTodo = card.kind==="todo";
    const badgeHex = card.color?BADGE_COLORS.find(c=>c.id===card.color)?.hex:null;

    const todosList  = isTodo?(card.todos||[]):[];
    const doneCount  = todosList.filter(t=>t.done).length;
    const totalCount = todosList.length;
    const progress   = totalCount>0?doneCount/totalCount:0;

    const preview = isTodo
      ? (totalCount===0 ? "Liste vide" : `${doneCount}/${totalCount} fait${doneCount>1?"s":""}`)
      : stripMd((card.content||"").split("\n").filter(Boolean)[0]||"");

    const rowBg = rowIndex%2===0 ? C.surface : C.rowAlt;
    const borderLeft = badgeHex ? `4px solid ${badgeHex}` : `4px solid transparent`;
    const iconColor = badgeHex?"#fff":C.accent2;
    const iconBg    = badgeHex?badgeHex:`${C.accent2}15`;

    return (
      <tr className="day-row"
        onClick={onToggle}
        style={{background:rowBg,cursor:"pointer",transition:"background 0.1s,opacity 0.2s",opacity:isArchived?0.55:1}}>

        {/* Icon cell (mirrors date cell) */}
        <td style={{width:52,borderLeft,padding:"10px 0",textAlign:"center",verticalAlign:"middle",userSelect:"none"}}>
          <div style={{width:32,height:32,borderRadius:8,background:iconBg,border:badgeHex?"none":`1px solid ${C.accent2}28`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,color:iconColor,margin:"0 auto"}}>
            {isTodo?"☑":"📋"}
          </div>
        </td>

        {/* Title + preview cell */}
        <td style={{padding:"10px 10px 10px 8px",minWidth:0,verticalAlign:"middle"}}>
          {isArchived?(
            <span style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>📦 Archivé — {card.title||"Sans titre"}</span>
          ):(
            <>
              <div style={{fontWeight:600,fontSize:13,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.title||"Sans titre"}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{preview}</div>
              {isTodo&&totalCount>0&&(
                <div style={{marginTop:5,height:3,borderRadius:2,background:C.border,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${progress*100}%`,background:doneCount===totalCount?C.accent2:C.accent,borderRadius:2,transition:"width 0.3s"}}/>
                </div>
              )}
            </>
          )}
        </td>

        {/* Chevron cell */}
        <td style={{width:36,padding:"10px 6px",textAlign:"center",verticalAlign:"middle"}}>
          <div style={{color:C.muted,fontSize:14,lineHeight:1}}>›</div>
        </td>
      </tr>
    );
  }

  /* ════════ PUSH PANEL — full-screen detail, slides in from the right
     like an iOS UINavigationController push, instead of the accordion
     row expansion this replaced. ════════ */
  function PushPanel({onClose, accentColor, title, children}) {
    const [entered,setEntered] = useState(false);
    const [closing,setClosing] = useState(false);
    useEffect(() => {
      const id = requestAnimationFrame(()=>setEntered(true));
      return () => cancelAnimationFrame(id);
    }, []);
    // Slide back out, then only clear the parent's state once the exit
    // animation has actually finished — otherwise the panel would vanish
    // instantly instead of feeling like a real "pop".
    const close = after => {
      setClosing(true);
      setTimeout(() => { onClose(); if(after) after(); }, 320);
    };
    const safeTop = "max(20px, env(safe-area-inset-top))";
    const safeBot = "max(20px, env(safe-area-inset-bottom))";
    return (
      <div style={{position:"fixed",inset:0,zIndex:40,background:C.bg,display:"flex",flexDirection:"column",
        transform:(entered&&!closing)?"translateX(0)":"translateX(100%)",
        transition:"transform 0.32s cubic-bezier(0.32,0.72,0,1)"}}>
        <div style={{paddingTop:safeTop,background:C.bg,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px 8px 6px"}}>
            <button onClick={()=>close()} style={{background:"none",border:"none",color:accentColor||C.accent,fontSize:16,fontWeight:600,cursor:"pointer",padding:"8px 6px",display:"flex",alignItems:"center",flexShrink:0}}>‹ Retour</button>
            <div style={{fontFamily:C.serif,fontSize:15,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textTransform:"capitalize"}}>{title}</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:16,paddingBottom:`calc(24px + ${safeBot})`}}>
          {children(close)}
        </div>
      </div>
    );
  }

  /* ════════ DAY DETAIL VIEW ════════ */
  function DayDetailView({day, index, total, settings, onClose, onEdit, onSwap, onArchive, onMove}) {
    const isArchived = !!day.archived;
    const hasPlan  = !!(day.planning||"").trim();
    const hasNotes = !!(day.notes||"").trim();
    const badgeHex = day.color?BADGE_COLORS.find(c=>c.id===day.color)?.hex:null;
    const btn = {flex:"1 1 auto",minWidth:80,padding:"10px 0",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600};
    const moveBtn = disabled => ({width:38,padding:"10px 0",borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,color:disabled?C.border:C.muted,fontSize:14,cursor:disabled?"default":"pointer"});
    return (
      <PushPanel onClose={onClose} accentColor={badgeHex||C.accent} title={fmtLong(day.date)}>
        {(close) => (
          <>
            {hasPlan?(
              <div style={{marginBottom:hasNotes?14:0}}>
                <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1.2,color:badgeHex||C.accent,marginBottom:8,fontWeight:700}}>📅 Programme</div>
                {renderBlock(day.planning, settings.fontSize, false)}
              </div>
            ):(
              <div style={{fontSize:13,color:C.muted,fontStyle:"italic",marginBottom:hasNotes?14:0}}>Aucun programme saisi</div>
            )}

            {hasNotes&&(
              <div style={{padding:"10px 12px",background:`${C.accent2}0c`,borderRadius:10,border:`1px solid ${C.accent2}28`,marginBottom:16}}>
                <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1.2,color:C.accent2,marginBottom:8,fontWeight:700}}>📌 Infos pratiques</div>
                {renderBlock(day.notes, settings.fontSize, true)}
              </div>
            )}

            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginTop:hasPlan||hasNotes?8:0}}>
              <button onClick={onEdit} style={{...btn,background:`${C.accent}12`,border:`1px solid ${C.accent}30`,color:C.accent}}>✏️ Modifier</button>
              <button onClick={()=>close(onSwap)} style={{...btn,background:`${C.accent2}12`,border:`1px solid ${C.accent2}30`,color:C.accent2}}>↔ Échanger</button>
              <button onClick={onArchive} style={{...btn,background:`${C.muted}12`,border:`1px solid ${C.muted}30`,color:C.muted}}>{isArchived?"↩ Désarchiver":"📦 Archiver"}</button>
              <button onClick={()=>onMove(-1)} disabled={index===0} style={moveBtn(index===0)}>↑</button>
              <button onClick={()=>onMove(1)} disabled={index===total-1} style={moveBtn(index===total-1)}>↓</button>
            </div>
          </>
        )}
      </PushPanel>
    );
  }

  /* ════════ CARD DETAIL VIEW ════════ */
  function CardDetailView({card, index, total, onClose, onEdit, onArchive, onMove, onToggleTodo}) {
    const isArchived = !!card.archived;
    const isTodo = card.kind==="todo";
    const badgeHex = card.color?BADGE_COLORS.find(c=>c.id===card.color)?.hex:null;
    const todosList  = isTodo?(card.todos||[]):[];
    const doneCount  = todosList.filter(t=>t.done).length;
    const totalCount = todosList.length;
    const progress   = totalCount>0?doneCount/totalCount:0;
    const btn = {flex:"1 1 auto",minWidth:80,padding:"10px 0",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600};
    const moveBtn = disabled => ({width:38,padding:"10px 0",borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,color:disabled?C.border:C.muted,fontSize:14,cursor:disabled?"default":"pointer"});
    return (
      <PushPanel onClose={onClose} accentColor={badgeHex||C.accent2} title={card.title||"Sans titre"}>
        {() => (
          <>
            {isTodo?(
              <div style={{marginBottom:16}}>
                {todosList.map(todo=>(
                  <div key={todo.id} onClick={()=>onToggleTodo(todo.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                    <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${todo.done?C.accent2:C.border2}`,background:todo.done?C.accent2:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                      {todo.done&&<span style={{color:C.onAccent,fontSize:12,fontWeight:700}}>✓</span>}
                    </div>
                    <div style={{fontSize:14,color:todo.done?C.muted:C.text,textDecoration:todo.done?"line-through":"none",lineHeight:1.5,flex:1}}>{renderInline(todo.text,todo.done?C.muted:C.text)}</div>
                  </div>
                ))}
                {totalCount===0&&<div style={{fontSize:13,color:C.muted,fontStyle:"italic"}}>Aucun item — modifie pour en ajouter</div>}
                {totalCount>0&&(
                  <div style={{marginTop:8,height:4,borderRadius:2,background:C.border,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${progress*100}%`,background:doneCount===totalCount?C.accent2:C.accent,borderRadius:2,transition:"width 0.3s"}}/>
                  </div>
                )}
              </div>
            ):(
              <div style={{marginBottom:16}}>{renderBlock(card.content,14,true)}</div>
            )}
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              <button onClick={onEdit} style={{...btn,background:`${C.accent2}12`,border:`1px solid ${C.accent2}30`,color:C.accent2}}>✏️ Modifier</button>

              <button onClick={()=>onMove(1)} disabled={index===total-1} style={moveBtn(index===total-1)}>↓</button>
            </div>
          </>
        )}
      </PushPanel>
    );
  }

  /* ════════ EDIT MODAL ════════ */
  function EditModal({modal,form,setForm,onClose,onSaveDay,onSaveCard,onSaveTrip,onGenerateDays,onDeleteDay,onDeleteCard,safeBot}) {

    // focused field switched to Aperçu) so FormatToolbar can grey itself out
    // instead of silently no-oping on a detached textarea.
    const [activeField, setActiveField] = useState(null);
    const onFocus = (ref,key) => { focusedRef.current = ref.current; setActiveField(key); };
    const onLeavePreview = key => { setActiveField(a => a===key ? null : a); if(activeField===key) focusedRef.current = null; };
    const isEdit   = !!modal.item;
    const inp      = {width:"100%",padding:"11px 13px",borderRadius:10,background:C.surface2,border:`1px solid ${C.border2}`,color:C.text,fontSize:16,outline:"none"};

    const lbl      = {fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6,display:"block"};
    const dayCount = form.startDate&&form.endDate?buildDays(form.startDate,form.endDate).length:null;

    const addTodo = () => {
      if(!newTodo.trim()) return;
      setForm({...form, todos:[...(form.todos||[]),{id:uid(),text:newTodo.trim(),done:false}]});
      setNewTodo("");
    };

    return (
      <div className="sheet-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:50,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>

            <div style={{fontFamily:C.serif,fontSize:18,fontWeight:600,color:C.text}}>
              {modal.type==="day" &&(isEdit?"Modifier le jour":"Ajouter un jour")}

              <MdField label="📅 Programme de la journée" minHeight={140} taRef={planningRef} onFocus={()=>onFocus(planningRef,"planning")} onEnterPreview={()=>onLeavePreview("planning")}

                value={form.planning} onChange={v=>setForm({...form,planning:v})}/>
              <MdField label="📌 Infos pratiques" minHeight={110} taRef={notesRef} onFocus={()=>onFocus(notesRef,"notes")} onEnterPreview={()=>onLeavePreview("notes")} withBullets={true}
                placeholder={"Résa hôtel: ABC-1234\nCheck-in: 15h00\nhttps://mon-hotel.com"}
                value={form.notes} onChange={v=>setForm({...form,notes:v})}/>

                {isEdit&&<button onClick={()=>onDeleteDay(modal.item.id)} style={{flex:1,padding:"13px",borderRadius:11,background:`${C.danger}10`,border:`1px solid ${C.danger}30`,color:C.danger,fontSize:14,cursor:"pointer"}}>Supprimer</button>}

              </div>

                <label style={lbl}>Titre</label>

                  <label style={lbl}>Items</label>
                  {(form.todos||[]).map((todo,ti)=>(
                    <div key={todo.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${todo.done?C.accent2:C.border2}`,background:todo.done?C.accent2:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}} onClick={()=>setForm({...form,todos:(form.todos||[]).map((t,i)=>i===ti?{...t,done:!t.done}:t)})}>
                        {todo.done&&<span style={{color:C.onAccent,fontSize:10,fontWeight:700}}>✓</span>}
                      </div>
                      <div style={{flex:1,fontSize:14,color:C.text,textDecoration:todo.done?"line-through":"none"}}>{todo.text}</div>
                      <button onClick={()=>removeTodo(todo.id)} style={{background:"none",border:"none",color:C.muted,fontSize:16,cursor:"pointer",padding:"0 4px"}}>✕</button>
                    </div>
                  ))}
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <input style={{...inp,flex:1}} placeholder="Nouvel item..." value={newTodo} onChange={e=>setNewTodo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTodo()}/>
                    <button onClick={addTodo} style={{padding:"11px 16px",borderRadius:10,background:C.accent,border:"none",color:C.onAccent,fontSize:14,fontWeight:600,cursor:"pointer"}}>+</button>
                  </div>
                </div>
              ):(
                <div>
                  <FormatToolbar focusedRef={focusedRef} helpOpen={showHelp} onToggleHelp={()=>setShowHelp(h=>!h)} active={!!activeField}/>
                  {showHelp && <div style={{marginBottom:12}}><MarkdownHelp/></div>}
                  <MdField label="Contenu" minHeight={160} taRef={contentRef} onFocus={()=>onFocus(contentRef,"content")} onEnterPreview={()=>onLeavePreview("content")} withBullets={true}
                    placeholder={"**Hôtel Sunshine Inn** — Chambre 412\nRésa: XBGT-9834\nhttps://hotel-sunshine.com"}
                    value={form.content} onChange={v=>setForm({...form,content:v})}/>
                </div>
              )}
              <div style={{display:"flex",gap:10,marginTop:4}}>
                {isEdit&&<button onClick={()=>onDeleteCard(modal.item.id)} style={{flex:1,padding:"13px",borderRadius:11,background:`${C.danger}10`,border:`1px solid ${C.danger}30`,color:C.danger,fontSize:14,cursor:"pointer"}}>Supprimer</button>}
                <button onClick={onSaveCard} style={{flex:2,padding:"13px",borderRadius:11,background:C.accent2,border:"none",color:C.onAccent,fontSize:15,fontWeight:600,cursor:"pointer"}}>{isEdit?"Enregistrer":"Ajouter"}</button>
              </div>
            </div>
          )}

          {/* TRIP FORM */}
          {modal.type==="trip"&&(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div><label style={lbl}>Nom du voyage</label><input style={inp} placeholder="Voyage au Japon 🗾" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})}/></div>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}><label style={lbl}>Départ</label><input type="date" style={inp} value={form.startDate||""} onChange={e=>setForm({...form,startDate:e.target.value})}/></div>
                <div style={{flex:1}}><label style={lbl}>Retour</label><input type="date" style={inp} value={form.endDate||""} onChange={e=>setForm({...form,endDate:e.target.value})}/></div>
              </div>
              {dayCount&&(
                <div style={{padding:"10px 14px",borderRadius:10,background:`${C.accent}0c`,border:`1px solid ${C.accent}25`}}>
                  <div style={{fontSize:13,color:C.accent,fontWeight:600}}>{dayCount} jours de voyage</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2,textTransform:"capitalize"}}>{fmtLong(form.startDate)} → {fmtLong(form.endDate)}</div>
                </div>
              )}
              <button onClick={onGenerateDays} style={{padding:"13px",borderRadius:11,background:`${C.accent}15`,border:`1px solid ${C.accent}40`,color:C.accent,fontSize:14,fontWeight:600,cursor:"pointer"}}>✨ Générer les jours automatiquement</button>
              <div style={{height:1,background:C.border}}/>
              <button onClick={onSaveTrip} style={{padding:"13px",borderRadius:11,background:C.accent,border:"none",color:C.onAccent,fontSize:15,fontWeight:600,cursor:"pointer"}}>Enregistrer sans générer</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  applyTheme(currentTheme);

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
</script>

<script>
  /* ── Service Worker ── */
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
      .then(reg => console.log("[PWA] Service worker enregistré ✓", reg.scope))
      .catch(err => console.warn("[PWA] Erreur service worker :", err));
  }
</script>
</body>
</html>
